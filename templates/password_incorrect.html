<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23FF0000'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' font-size='36' font-family='Arial' fill='white'%3EAB%3C/text%3E%3C/svg%3E">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        input[type="text"], input[type="password"], input[type="submit"], button[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .guest-btn {
            background-color: #f5f5f5;
            cursor: pointer;
        }
        .error-message {
            color: red;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <form id="passwordForm" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="password" required>
            <input type="submit" value="Login">
            <button type="submit" name="login_mode" value="guest" class="guest-btn" formnovalidate>Enter as Guest</button>
            <div class="error-message" id="errorMessage" style="display: block;">Incorrect username or password. Please try again.</div>
        </form>
    </div>

</body>
</html>
